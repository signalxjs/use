packages:
  - packages/*

# Single source of truth for the sigx core version this repo consumes.
# Core (@sigx/reactivity et al.) keeps reactive state in module-local variables,
# so exactly ONE physical copy must resolve — the ^0.12.0 (>=0.12.0 <0.13.0)
# single-minor pin forces pnpm to hoist one copy. Bump these together on the
# next core release.
catalog:
  "@sigx/reactivity": ^0.12.0
  "@sigx/runtime-core": ^0.12.0
  "@sigx/runtime-dom": ^0.12.0
  sigx: ^0.12.0

onlyBuiltDependencies:
  - esbuild
